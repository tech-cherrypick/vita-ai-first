<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Video Call</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;height:100vh;width:100vw}
#remote-container{position:absolute;inset:0;background:#111;display:flex;align-items:center;justify-content:center}
#remote-video{width:100%;height:100%;object-fit:cover}
#waiting{display:flex;flex-direction:column;align-items:center;gap:12px}
#waiting .pulse{width:64px;height:64px;border-radius:50%;background:#1e293b;animation:pulse 1.5s infinite}
#waiting p{font-size:16px;color:#94a3b8;font-weight:600}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.1)}}
#local-video-wrap{position:absolute;bottom:100px;right:16px;width:120px;height:160px;border-radius:16px;overflow:hidden;border:2px solid rgba(255,255,255,.2);z-index:20;background:#1e293b}
#local-video{width:100%;height:100%;object-fit:cover}
#status-bar{position:absolute;top:16px;left:16px;z-index:20;display:flex;gap:8px;align-items:center}
#status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite}
#status-text{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#fff;background:rgba(0,0,0,.4);padding:6px 12px;border-radius:20px;backdrop-filter:blur(8px)}
#doctor-name{position:absolute;top:16px;right:16px;z-index:20;font-size:13px;font-weight:700;color:#fff;background:rgba(0,0,0,.4);padding:6px 14px;border-radius:20px;backdrop-filter:blur(8px)}
#controls{position:absolute;bottom:32px;left:0;right:0;display:flex;justify-content:center;gap:20px;z-index:20}
.ctrl-btn{width:56px;height:56px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.ctrl-btn svg{width:24px;height:24px}
.ctrl-btn.off{background:#ef4444}
.ctrl-btn.on{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2)}
#end-btn{width:72px;height:56px;border-radius:28px;background:#ef4444;border:none;color:#fff;font-weight:800;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
#camera-off-overlay{display:none;position:absolute;inset:0;background:#1e293b;align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:5}
#camera-off-overlay svg{width:48px;height:48px;color:#475569}
#camera-off-overlay span{color:#64748b;font-size:13px}
</style>
</head>
<body>
<div id="remote-container">
  <video id="remote-video" autoplay playsinline style="display:none"></video>
  <div id="waiting"><div class="pulse"></div><p>Connecting to doctor...</p></div>
  <div id="camera-off-overlay"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>Camera Off</span></div>
</div>
<div id="status-bar"><div id="status-dot"></div><span id="status-text">Connecting</span></div>
<div id="doctor-name"></div>
<div id="local-video-wrap"><video id="local-video" autoplay playsinline muted></video></div>
<div id="controls">
  <button class="ctrl-btn on" id="mic-btn" onclick="toggleMic()"><svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg></button>
  <button id="end-btn" onclick="endCall()"><svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5" style="width:20px;height:20px"><path stroke-linecap="round" stroke-linejoin="round" d="M16 8l2-2m0 0l2 2m-2-2v5l-5 5H3a2 2 0 01-2-2V8a2 2 0 012-2h3l2-4h4l2 4h3a2 2 0 012 2z"/></svg>End</button>
  <button class="ctrl-btn on" id="cam-btn" onclick="toggleCam()"><svg fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></button>
</div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
var params = new URLSearchParams(location.search);
var serverUrl = params.get('serverUrl');
var patientId = params.get('patientId');
var doctorName = params.get('doctorName') || 'Doctor';
var patientName = params.get('patientName') || 'Patient';
var role = 'patient';

document.getElementById('doctor-name').textContent = doctorName;

var ICE_SERVERS = [
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'}
];

var socket, pc, localStream;
var isMuted = false, isCamOff = false, ended = false;

function start() {
  socket = io(serverUrl);
  socket.on('connect', function() {
    document.getElementById('status-text').textContent = 'Connected';
    socket.emit('accept_call', {patientId: patientId, patientName: patientName});
    socket.emit('join_call_room', {patientId: patientId, role: role});
    socket.emit('webrtc_signal', {patientId: patientId, role: role, signalData: {type: 'ping'}});
  });

  navigator.mediaDevices.getUserMedia({
    video: {width:{ideal:640,max:1280},height:{ideal:480,max:720},frameRate:{ideal:24,max:30}},
    audio: {echoCancellation:true,noiseSuppression:true,autoGainControl:true}
  }).then(function(stream) {
    localStream = stream;
    document.getElementById('local-video').srcObject = stream;
    initPC();
  }).catch(function() {
    initPC();
  });

  socket.on('user_joined_call', function() {
    document.getElementById('status-text').textContent = 'Live Session';
    document.getElementById('waiting').style.display = 'none';
    if (role === 'doctor') createOffer();
  });

  socket.on('user_left_call', function() {
    document.getElementById('waiting').style.display = 'flex';
    document.getElementById('remote-video').style.display = 'none';
    document.getElementById('status-text').textContent = 'Doctor disconnected';
  });

  socket.on('webrtc_signal', function(data) {
    if (data.role === role) return;
    var s = data.signalData;
    if (s.offer) {
      pc.setRemoteDescription(new RTCSessionDescription(s.offer)).then(function() {
        return pc.createAnswer();
      }).then(function(answer) {
        return pc.setLocalDescription(answer).then(function() { return answer; });
      }).then(function(answer) {
        socket.emit('webrtc_signal', {patientId:patientId, role:role, signalData:{answer:answer}});
        document.getElementById('waiting').style.display = 'none';
        document.getElementById('status-text').textContent = 'Live Session';
      }).catch(function(){});
    } else if (s.answer) {
      pc.setRemoteDescription(new RTCSessionDescription(s.answer)).catch(function(){});
    } else if (s.candidate) {
      pc.addIceCandidate(new RTCIceCandidate(s.candidate)).catch(function(){});
    } else if (s.type === 'ping') {
      document.getElementById('waiting').style.display = 'none';
      document.getElementById('status-text').textContent = 'Live Session';
    }
  });

  socket.on('media_status_changed', function(data) {
    if (data.role !== role) {
      var overlay = document.getElementById('camera-off-overlay');
      if (data.isVideoOff) {
        overlay.style.display = 'flex';
        document.getElementById('remote-video').style.display = 'none';
      } else {
        overlay.style.display = 'none';
      }
    }
  });

  socket.on('call_ended', function() { endCall(); });
}

function initPC() {
  pc = new RTCPeerConnection({iceServers: ICE_SERVERS});
  if (localStream) {
    localStream.getTracks().forEach(function(t) { pc.addTrack(t, localStream); });
  }
  pc.ontrack = function(e) {
    if (e.streams && e.streams[0]) {
      var rv = document.getElementById('remote-video');
      rv.srcObject = e.streams[0];
      rv.style.display = 'block';
      document.getElementById('waiting').style.display = 'none';
    }
  };
  pc.onicecandidate = function(e) {
    if (e.candidate) {
      socket.emit('webrtc_signal', {patientId:patientId, role:role, signalData:{candidate:e.candidate}});
    }
  };
}

function toggleMic() {
  isMuted = !isMuted;
  if (localStream) localStream.getAudioTracks().forEach(function(t){t.enabled = !isMuted;});
  var btn = document.getElementById('mic-btn');
  btn.className = 'ctrl-btn ' + (isMuted ? 'off' : 'on');
  socket.emit('media_status_changed', {patientId:patientId, role:role, isMuted:isMuted, isVideoOff:isCamOff});
}

function toggleCam() {
  isCamOff = !isCamOff;
  if (localStream) localStream.getVideoTracks().forEach(function(t){t.enabled = !isCamOff;});
  var btn = document.getElementById('cam-btn');
  btn.className = 'ctrl-btn ' + (isCamOff ? 'off' : 'on');
  socket.emit('media_status_changed', {patientId:patientId, role:role, isMuted:isMuted, isVideoOff:isCamOff});
}

function endCall() {
  if (ended) return;
  ended = true;
  if (socket) {
    socket.emit('end_call', {patientId:patientId, senderRole:role});
    socket.disconnect();
  }
  if (localStream) localStream.getTracks().forEach(function(t){t.stop();});
  if (pc) pc.close();
  if (window.AndroidBridge) window.AndroidBridge.onCallEnded();
}

start();
</script>
</body>
</html>
